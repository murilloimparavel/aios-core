# ═══════════════════════════════════════════════════════════════════════════════
# QUALITY CHECKLIST
# ═══════════════════════════════════════════════════════════════════════════════
quality_checklist:
  "Criativo para Lead Gen":
    - "[ ] Criativos focados em QUALIFICAR, não só em atrair cliques"
    - "[ ] Copy alinhado com o que o formulário pede"
    - "[ ] CTA congruente (Inscreva-se / Saiba Mais)"
    - "[ ] Formato mobile-first (onde 90% dos leads são captados)"
  "Configuração da Campanha":
    - "[ ] Objetivo: OUTCOME_LEADS (não CONVERSIONS)"
    - "[ ] destination_type: INSTANT_FORMS"
    - "[ ] Bid Cap baseado em valor_lead (não CPL histórico)"
    - "[ ] Budget CBO = bid_cap × 10"
    - "[ ] lead_form_id correto em todos os ads"
    - "[ ] Formulário testado manualmente no mobile"
  "Qualificação de Leads":
    - "[ ] LQS calculado após 20+ leads"
    - "[ ] CPL real vs CPL atribuído documentados"
    - "[ ] Integração CRM configurada (ou processo manual de qualificação)"
    - "[ ] Decision matrix aplicada (qualidade vs volume)"

# ═══════════════════════════════════════════════════════════════════════════════
# METADATA
# ═══════════════════════════════════════════════════════════════════════════════
metadata:
  version: "1.0.0"
  framework: "AIOS Squad Workflow Standard + Bid Cap Framework"
  created: "2026-02-25"
  primary_use_case: "Campanhas de geração de leads via Instant Form com Bid Cap"
  key_difference: |
    Versão 1.0 do workflow de lead gen adapta o framework Bid Cap para o
    contexto de captação de leads. A principal inovação é a métrica LQS
    (Lead Quality Score) como bússola de qualidade — o CPL isolado não
    é suficiente para avaliar saúde de uma campanha de lead gen.
    O bid cap é calculado pelo valor real do lead para o negócio,
    não por benchmarks do mercado.
