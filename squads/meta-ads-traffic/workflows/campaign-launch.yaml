# WF-01: Lançar Campanha Meta Ads com Bid Cap
# Duration: 2-4h
# Best for: Novas campanhas de vendas com controle de CPA
# Key Agents: CreativeStrategist → TrafficManager → DataAnalyst

workflow:
  id: wf-campaign-launch
  name: "Lançar Campanha Meta Ads com Bid Cap"
  version: "2.0.0"
  duration: "2-4h"
  description: |
    Workflow completo para lançar uma campanha de vendas no Meta Ads
    usando a estratégia Bid Cap (lance manual por conversão).

    Este workflow garante:
    - Cálculo correto do Break Even CPA antes de qualquer gasto
    - Estrutura CBO (Campaign Budget Optimization) consolidada
    - Volume criativo mínimo de 3 ângulos distintos
    - Verificação de tracking antes da ativação
    - Aprovação humana obrigatória antes de ACTIVE

    Produções deste workflow:
    - Campanha CBO criada com bid cap configurado
    - Ad sets com 1 criativo cada (broad targeting)
    - Creative brief para próximos 10 criativos
    - Log de configuração para referência

  best_for:
    - "Lançamento de novo produto ou oferta"
    - "Criar estrutura CBO do zero com controle de CPA"
    - "Transição de Highest Volume para Bid Cap"
    - "Conta nova ou conta que nunca usou Bid Cap"

  decision_matrix_fit:
    objective: "OUTCOME_SALES"
    bid_strategy: "Bid Cap (LOWEST_COST_WITH_BID_CAP)"
    budget_type: "CBO — inflacionado (10× bid cap)"
    audience: "Broad targeting — criativo faz a segmentação"
    creative_volume: "Mínimo 3, ideal 10-15 para lançamento"

  agents:
    primary: "meta-ads-traffic:creative-strategist-designer + meta-ads-traffic:traffic-manager-engineer"
    secondary:
      - "meta-ads-traffic:data-analyst-analyzer (auditoria final)"

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 1: ESTRATÉGIA E CRIATIVOS (CreativeStrategist)
# ═══════════════════════════════════════════════════════════════════════════════
phases:
  - id: PHASE-1
    name: "Estratégia Criativa"
    days: "0.5"
    tier: 0
    description: |
      CreativeStrategist analisa produto, define ângulos e gera o
      creative brief para a campanha. Sem bons criativos, o Bid Cap
      não consegue encontrar conversões no leilão.

    tasks:
      - task_file: tasks/creative-cycle.md
        agent: meta-ads-traffic:creative-strategist-designer
        required: true
        description: "Gerar 3-5 ângulos + hooks + copies para lançamento"
        output: "creative_brief.md — ângulos, hooks e copies prontos"

    creative_strategy:
      angles_minimum: 3
      hooks_per_angle: 3
      copy_complete: true
      formats:
        - "UGC 30s (prioridade se disponível)"
        - "Estático com copy direto"
        - "Carrossel com prova social"

    checkpoint:
      criteria:
        - "Mínimo 3 ângulos distintos definidos"
        - "10+ hooks gerados (primeiros 3 segundos)"
        - "Copy completo para os 3 ângulos prioritários"
        - "Brief de produção criado por criativo"
      human_review: false
      message: |
        ✅ PHASE-1 COMPLETE: Creative Brief gerado.
        Ângulos: [N] | Hooks: [N] | Criativos briefados: [N]
        Próximo: TrafficManager configura campanha.

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 2: CÁLCULO FINANCEIRO E ESTRUTURA (TrafficManager)
# ═══════════════════════════════════════════════════════════════════════════════
  - id: PHASE-2
    name: "Cálculo e Estrutura de Campanha"
    days: "0.5"
    tier: 0
    description: |
      TrafficManager calcula Break Even CPA, define Bid Cap e Budget CBO,
      cria a estrutura de campanha completa via Meta Marketing API.
      Campanha fica em PAUSED até validação final.

    tasks:
      - task_file: tasks/bid-cap-launch.md
        agent: meta-ads-traffic:traffic-manager-engineer
        required: true
        description: "Calcular financeiro, criar campanha CBO + ad sets + ads"
        output: "campaign_ids.json — IDs de campanha, ad sets e ads criados"
        notes: |
          IMPORTANTE: Campanha deve ficar em status PAUSED.
          NÃO ativar antes da PHASE-4 (auditoria).

    financial_config:
      formula: |
        margem = preco - custos_totais
        break_even_cpa = margem
        bid_cap = break_even_cpa * 1.25
        budget_cbo = bid_cap * 10
      example: |
        Produto R$200, custos R$80:
        → Margem: R$120
        → Break Even CPA: R$120
        → Bid Cap: R$150
        → Budget CBO: R$1.500/dia

    campaign_structure:
      type: "Vendas Manual (NÃO Advantage+)"
      optimization: "CBO"
      bid_strategy: "LOWEST_COST_WITH_BID_CAP"
      targeting: "Broad (gênero + faixa etária apenas)"
      ads_per_adset: 1
      naming_convention:
        campanha: "{PAÍS} | Vendas | CBO | BidCap | {PRODUTO}"
        adset: "AS | {ÂNGULO} | Broad | v{N}"
        ad: "AD | {PRODUTO} | {ÂNGULO} | v{N}"

    checkpoint:
      criteria:
        - "Break Even CPA calculado e confirmado pelo usuário"
        - "Bid Cap = Break Even × 1.2 a 1.3"
        - "Budget CBO = Bid Cap × 10"
        - "Campanha criada com naming convention correta"
        - "Todos os ad sets criados (1 por criativo)"
        - "Todos os ads criados em status PAUSED"
        - "UTM configurado em 100% dos ads"
      human_review: true
      message: |
        ⚠️ CHECKPOINT PHASE-2: Revisão humana necessária.

        Resumo da estrutura criada:
        • Campanha: [ID] | Budget: R$X/dia | Bid: R$X
        • Ad Sets criados: [N]
        • Ads criados: [N] | Status: PAUSED

        Confirme: Financeiro OK? Estrutura OK? Tracking OK?
        [APROVAR] → seguir para auditoria
        [REVISAR] → voltar para ajustes

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 3: UPLOAD DE CRIATIVOS (TrafficManager)
# ═══════════════════════════════════════════════════════════════════════════════
  - id: PHASE-3
    name: "Upload e Configuração de Criativos"
    days: "0.5"
    tier: 1
    description: |
      TrafficManager faz upload dos assets (imagens/vídeos) e configura
      os ad creatives com copy do brief. UTM tracking verificado em todos.

    tasks:
      - task_file: tasks/bid-cap-launch.md
        agent: meta-ads-traffic:traffic-manager-engineer
        required: true
        description: "Upload assets + criar ad creatives + vincular aos ads"
        output: "creative_ids.json — IDs de todos os ad creatives criados"
        notes: |
          Usar Step 5 e 6 do bid-cap-launch.md especificamente.
          Verificar que cada ad referencia o creative correto.

    creative_requirements:
      utm_format: "utm_source=facebook&utm_medium=paid&utm_campaign={nome}&utm_content={angulo}"
      utm_required: true
      formats_supported:
        - image: "JPG/PNG — 1:1 ou 4:5 — mín 1080×1080px"
        - video: "MP4 — 9:16 ou 4:5 — mín 720p — até 15 min"
        - carousel: "2-10 cards — 1:1 — mín 600×600px"

    checkpoint:
      criteria:
        - "Todos os assets upados sem erro"
        - "Ad creatives criados com copy correto por ângulo"
        - "UTM presente em 100% dos links"
        - "Preview dos ads verificado visualmente"
      human_review: false
      message: |
        ✅ PHASE-3 COMPLETE: Criativos configurados.
        Assets: [N] | Creatives: [N] | UTM: 100% ✓

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 4: AUDITORIA FINAL E ATIVAÇÃO (DataAnalyst + Humano)
# ═══════════════════════════════════════════════════════════════════════════════
  - id: PHASE-4
    name: "Auditoria Final e Ativação"
    days: "0.5"
    tier: 1
    description: |
      DataAnalyst faz auditoria pré-lançamento verificando tracking,
      estrutura e configuração. Aprovação humana obrigatória antes
      de ativar a campanha.

    tasks:
      - task_file: tasks/daily-audit.md
        agent: meta-ads-traffic:data-analyst-analyzer
        required: true
        description: "Auditoria pré-lançamento: tracking, estrutura, bid config"
        output: "pre_launch_audit.md — checklist de aprovação"

    pre_launch_checklist:
      tracking:
        - "Pixel disparando evento Purchase no checkout"
        - "CAPI configurada (score > 8 no Events Manager)"
        - "Janela de atribuição: 7d click, 1d view"
      structure:
        - "Budget CBO = 10× Bid Cap"
        - "1 ad por ad set"
        - "Targeting: Broad sem interesses narrow"
        - "Bid Cap correto em cada ad set"
      creatives:
        - "UTM em todos os ads"
        - "Preview visual aprovado"
        - "Copy não viola políticas Meta"
      financial:
        - "Break Even CPA documentado"
        - "Bid Cap = BE × 1.2-1.3 confirmado"

    checkpoint:
      criteria:
        - "Todos os itens do pre_launch_checklist aprovados"
        - "DataAnalyst emitiu aprovação"
        - "Usuário confirmou com comando ATIVAR"
      human_review: true
      message: |
        🚀 CHECKPOINT FINAL: Aprovação para ativação.

        ✅ Auditoria concluída por DataAnalyst
        ✅ Estrutura validada
        ✅ Tracking verificado

        Para ativar a campanha, confirme: [ATIVAR]
        Para ajustes, confirme: [REVISAR]

# ═══════════════════════════════════════════════════════════════════════════════
# COMPLETION SIGNALS
# ═══════════════════════════════════════════════════════════════════════════════
completion_signal: "<promise>COMPLETE</promise>"
checkpoint_signal: "<promise>CHECKPOINT:PHASE-{N}</promise>"
blocked_signal: "<promise>BLOCKED:CAMPAIGN-LAUNCH</promise>"

# ═══════════════════════════════════════════════════════════════════════════════
# OUTPUT ARTIFACTS
# ═══════════════════════════════════════════════════════════════════════════════
outputs:
  phase_1:
    - "creative_brief.md — ângulos, hooks, copies"
    - "production_briefs/ — briefs por criativo"
  phase_2:
    - "campaign_ids.json — IDs de campanha e ad sets"
    - "financial_config.md — break even, bid cap, budget"
  phase_3:
    - "creative_ids.json — IDs dos ad creatives"
    - "utm_checklist.md — verificação de UTMs"
  phase_4:
    - "pre_launch_audit.md — relatório de aprovação"
    - "campaign_live_summary.md — resumo pós-ativação"

# ═══════════════════════════════════════════════════════════════════════════════
# ERROR HANDLING
# ═══════════════════════════════════════════════════════════════════════════════
error_handling:
  on_phase_failure:
    - log_error: true
    - notify_stakeholders: true
    - halt_workflow: true
    - rollback: "Manter campanha em PAUSED se erro na Phase 4"

  on_checkpoint_failure:
    - log_failure_reason: true
    - return_to_previous_phase: true
    - max_retries: 2

  specific_errors:
    pixel_not_firing:
      phase: PHASE-4
      action: "BLOCK — não ativar sem pixel configurado"
      escalate_to: "Usuário resolver tracking antes de prosseguir"
    creative_disapproved:
      phase: PHASE-4
      action: "Pausar ad reprovado, solicitar revisão ao CreativeStrategist"
      escalate_to: "meta-ads-traffic:creative-strategist-designer"

# ═══════════════════════════════════════════════════════════════════════════════
# AGENT ASSIGNMENTS BY PHASE
# ═══════════════════════════════════════════════════════════════════════════════
agents_by_phase:
  PHASE-1:
    primary:
      - "meta-ads-traffic:creative-strategist-designer"
    secondary: []
  PHASE-2:
    primary:
      - "meta-ads-traffic:traffic-manager-engineer"
    secondary:
      - "meta-ads-traffic:creative-strategist-designer (brief reference)"
  PHASE-3:
    primary:
      - "meta-ads-traffic:traffic-manager-engineer"
    secondary: []
  PHASE-4:
    primary:
      - "meta-ads-traffic:data-analyst-analyzer"
    secondary:
      - "meta-ads-traffic:traffic-manager-engineer (ativação)"

# ═══════════════════════════════════════════════════════════════════════════════
# QUALITY CHECKLIST
# ═══════════════════════════════════════════════════════════════════════════════
quality_checklist:
  "Estratégia Criativa":
    - "[ ] Mínimo 3 ângulos distintos (dor, transformação, social proof)"
    - "[ ] 10+ hooks gerados com especificidade de avatar"
    - "[ ] Copy completo para os 3 ângulos prioritários"
    - "[ ] Formato de criativo definido por ângulo"
  "Estrutura de Campanha":
    - "[ ] Break Even CPA calculado e documentado"
    - "[ ] Bid Cap = BE × 1.2-1.3 (estratégia agressiva)"
    - "[ ] Budget CBO = Bid Cap × 10 (inflacionado)"
    - "[ ] Naming convention seguida em todos os níveis"
    - "[ ] 1 ad por ad set (isolamento de dados)"
    - "[ ] Broad targeting (sem interesses narrow)"
  "Upload de Criativos":
    - "[ ] Assets upados sem erro de formato"
    - "[ ] UTM configurado em 100% dos ads"
    - "[ ] Preview visual conferido"
    - "[ ] Copy copiado fielmente do brief"
  "Auditoria Final":
    - "[ ] Pixel disparando Purchase corretamente"
    - "[ ] CAPI com score > 8"
    - "[ ] Aprovação humana registrada"
    - "[ ] Campanha ativada (ACTIVE)"

# ═══════════════════════════════════════════════════════════════════════════════
# METADATA
# ═══════════════════════════════════════════════════════════════════════════════
metadata:
  version: "2.0.0"
  framework: "AIOS Squad Workflow Standard + Bid Cap Framework"
  created: "2026-02-25"
  primary_use_case: "Lançamento de campanha Meta Ads com Bid Cap"
  key_difference: |
    Versão 2.0 incorpora Bid Cap como estratégia padrão (não Highest Volume),
    adiciona quality gates formais por fase, e exige aprovação humana
    obrigatória antes da ativação. O cálculo de Break Even CPA é mandatório
    — não existe ativação sem financeiro validado.
