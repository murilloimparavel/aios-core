    quotes:
      - "A escola não mediu sua inteligência. Mediu sua obediência."
      - "87,5% dos tipos de inteligência são ignorados pela escola."
      - "A maioria das escolas ainda para no nível 2 — Compreender."
  - source: entrevista.md
    quote: "Reprovação na 6ª série por conversar muito"

filter_action: "Crítica pública, criação de alternativas educacionais"

