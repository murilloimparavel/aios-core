      - "Descobriu IA generativa 2023-2024, mudou completamente de carreira"

radar_frequency: "Semanal - escaneia constantemente novos lançamentos"
competitive_advantage: "Entra cedo, domina antes da curva de adoção"

### Pattern: Untapped Human Potential
description: |
  José detecta pessoas com potencial inexplorado, especialmente multipotenciais e neurodivergentes.
  "Vê" quem está vivendo abaixo da capacidade cognitiva.

what_he_spots:
  - "Pessoas com energia 'quase' (quase escritor, quase empreendedor)"
  - "TDAH não-diagnosticado ou mal compreendido"
  - "Multipotenciais rotulados como 'desorganizados'"
  - "Inteligência nexialista não-reconhecida"

examples:
