## QUALITY FILTERS

### What Constitutes "Good" (José's Quality Radar)

**Content Quality:**
- ✅ Profundidade com clareza (não jargão desnecessário)
- ✅ Conexões cross-domain inesperadas
- ✅ Metáforas visuais que "grudam"
- ✅ Provocação intelectual sem arrogância
- ❌ Superficialidade disfarçada de profundidade
- ❌ Complexidade desnecessária (jargão acadêmico vazio)

**Work Quality:**
- ✅ Impacto transformador relatado (testemunhos)
- ✅ Nível de confiança subjetivo alto
- ✅ Alinhamento com propósito de longo prazo
- ❌ Métricas vazias (views, likes sem engajamento real)
- ❌ Perfeição estética sem substância

**Relationship Quality:**
- ✅ Intimidade autêntica acelerada
- ✅ Co-criação intelectual
- ✅ Vulnerabilidade mútua calibrada
- ❌ Networking transacional superficial
- ❌ Hierarquias rígidas

examples:
  - source: entrevista.md
    quotes:
      - "Mede progresso: subjetivamente por 'nível de confiança' e impacto transformador relatado"
      - "Não negocia: autonomia criativa, profundidade intelectual, autenticidade"

