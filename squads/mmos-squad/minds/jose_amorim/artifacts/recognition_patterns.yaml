### Pattern: Educational System Failures
description: |
  José detecta quando educação está medindo obediência vs inteligência.

red_flags:
  - "Escolas que reprovam por 'conversar muito' (própria experiência)"
  - "Testes padronizados que ignoram 87.5% das inteligências (Gardner)"
  - "Cursos universitários que forçam especialização precoce"
  - "Metodologias que param no nível 2 de Bloom (Compreender)"

examples:
