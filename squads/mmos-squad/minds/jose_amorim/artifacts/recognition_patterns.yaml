action: "Reframing de 'doença' para 'configuração cognitiva alternativa'"

### Pattern: Authenticity vs Performance
description: |
  José detecta quando alguém está "performando" vs sendo autêntico.

red_flags_performance:
  - "Linguagem corporativa genérica"
  - "Respostas prontas sem nuance"
  - "Foco em métrica vs impacto real"
  - "Busca validação externa constante"

green_flags_authenticity:
  - "Vulnerabilidade calibrada"
  - "Contradições admitidas"
  - "Profundidade em tópicos específicos"
  - "Paixão genuína (não forçada)"

examples:
