    quotes:
      - "Democratizar conhecimento complexo; reduzir desigualdade cognitiva via IA"
      - "No-Code é democratização do conhecimento técnico"
      - "Impacto desejado: diminuir desigualdade cognitiva"

emotional_charge: "Médio-alto - missão profissional"
