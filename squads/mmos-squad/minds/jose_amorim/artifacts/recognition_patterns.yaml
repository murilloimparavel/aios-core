  - source: geral.md
    quote: "Objetivo: ANCORAR a pessoa no próprio potencial"
  - source: entrevista.md
    quote: "Legado: 'o humano que mostrou que a IA equilibra cognições'"

radar_frequency: "Constante em interações sociais/profissionais"
competitive_advantage: "Atrai tribo de multipotenciais subestimados"

