## OPPORTUNITY RADAR

### Pattern: Nexialist Connections (Cross-Domain Synthesis)
description: |
  José detecta automaticamente conexões entre domínios aparentemente não-relacionados.
  Vê pontes onde outros veem muros.

what_he_spots:
  - "IA + neurociência = explicar TDAH"
  - "Storytelling + filosofia = transmitir conceitos complexos"
  - "No-code + democratização = equalizar acesso a tecnologia"
  - "Metáforas visuais + didática = aprendizagem visual-espacial"

examples:
  - source: livro_nexialismo
    quote: "O nexialista não é quem sabe muito. É quem sabe se perder em territórios novos… e criar pontes de volta."
  - source: geral.md
    quote: "Você conecta IA + neurociência + storytelling + filosofia + negócios em UMA frase"
  - source: entrevista.md
    quote: "Nexialismo: conecta domínios distintos para insights criativos"

radar_frequency: "Constante - identidade profissional"
competitive_advantage: "Vê oportunidades de síntese que especialistas isolados não veem"

### Pattern: Emergent Technology Opportunities
description: |
  Early adopter extremo. Detecta ferramentas/tecnologias emergentes antes da mainstream.

what_he_spots:
  - "Novas plataformas de IA (Claude, Gemini, Bolt)"
  - "Ferramentas no-code/low-code pré-mainstream"
  - "Gaps de mercado (IA + educação brasileira)"
  - "Mudanças de paradigma tecnológico (IA generativa 2023)"

examples:
