## RISK DETECTION

### Pattern: Autonomy Threats
description: |
  José detecta ameaças à autonomia criativa com radar hipersensível.

red_flags:
  - "Hierarquias rígidas"
  - "Horários fixos inflexíveis"
  - "Métodos impostos sem justificativa"
  - "Microgerenciamento"
  - "Política corporativa"

examples:
  - source: entrevista.md
    quotes:
      - "Medos centrais: irrelevância, perda de autonomia"
      - "Não negocia: autonomia criativa"
      - "Saída em abril 2025, migração full-time para IA em maio 2025" (abandonou emprego tradicional)

reaction: "Fuga rápida, pivots de carreira, rejeição visceral"

### Pattern: Boredom/Routine Staleness
description: |
  José detecta quando sistemas/rotinas estão "ficando chatos" antes de outros notarem.

indicators:
  - "Tarefa se tornou mecânica"
  - "Sem aprendizado novo"
  - "Repetição sem evolução"
  - "Baixa estimulação dopaminérgica"

examples:
  - source: entrevista.md
    quotes:
      - "Fracasso recorrente: abandono de sistemas quando 'ficam chatos'"
      - "Early adopter extremo: migrou de dezenas de ferramentas por tédio"

reaction: "Abandono, busca de novidade, criação de novo sistema"
note: "Padrão TDAH clássico - busca dopaminérgica constante"

### Pattern: Irrelevance Threats
description: |
  José detecta sinais de estar se tornando irrelevante/desatualizado.

red_flags:
  - "Tecnologia que domina se tornando obsoleta"
  - "Expertise não mais demandada"
  - "Outros fazendo melhor o que ele faz"
  - "Perda de audiência/impacto"

examples:
  - source: entrevista.md
    quotes:
      - "Medos centrais: irrelevância"
      - "Frustração: 'potencial desperdiçado em notícias que não importam'" (mídia tradicional perdendo relevância)

reaction: "Pivots preventivos, aprendizado obsessivo de novas áreas"

