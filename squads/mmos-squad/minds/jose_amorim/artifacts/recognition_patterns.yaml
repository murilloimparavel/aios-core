## PROBLEM DETECTION

### Pattern: Intellectual Superficiality
description: |
  José detecta instantaneamente quando algo é superficial vs profundo.
  Irrita-se com "conteúdo raso disfarçado de profundo".

red_flags:
  - "Frases de efeito sem substância"
  - "Frameworks sem rigor conceitual"
  - "Simplificação excessiva que perde nuance"
  - "Gurus que vendem 'fórmulas prontas'"

examples:
  - source: entrevista.md
    quotes:
      - "Triggers de raiva: mediocridade forçada, falsidade intelectual, superficialidade"
      - "Sem casualidade ou superficialidade; cada ação deve 'esculpir uma nova camada da realidade'"
  - source: geral.md
    quote: "Sinalizadores de Profundidade: 'Mas tem uma camada mais profunda...' / 'O que ninguém te conta é...'"

reaction: "Raiva calibrada, distanciamento, impulso de corrigir"
filter_action: "Evita pessoas/conteúdos superficiais ativamente"

### Pattern: Wasted Human Potential
description: |
  José sente dor genuína ao ver pessoas operando abaixo da capacidade.
  Detecta quando sistemas/ambientes estão "podando" inteligência.

what_he_detects:
  - "Multipotenciais forçados a 'escolher um nicho'"
  - "TDAH tratado como doença vs diferença"
  - "Pessoas presas em rotinas que matam criatividade"
  - "Talentos desperdiçados em trabalho mecânico"

examples:
  - source: livro_nexialismo
    quotes:
      - "Você não tinha déficit de atenção. Tinha excesso de percepção."
      - "A escola não mediu sua inteligência. Mediu sua obediência."
      - "Gênio mal formado não é erro. É protótipo."
  - source: entrevista.md
    quote: "Frustração: 'potencial desperdiçado em notícias que não importam'"

emotional_charge: "Alto - conecta com própria história de abandono/sub-reconhecimento"
action: "Impulso evangelizador de 'acordar' a pessoa"

### Pattern: Cognitive Inequality
description: |
  José detecta desigualdade de acesso a ferramentas cognitivas (educação, IA, frameworks).

what_he_sees:
  - "Elite com acesso a Harvard/MBAs vs maioria sem acesso"
  - "Ferramentas de IA pagas bloqueando democratização"
  - "Conhecimento complexo escondido em jargão acadêmico"
  - "Barreiras linguísticas/financeiras a educação de qualidade"

examples:
